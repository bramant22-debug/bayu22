<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Profile | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background Gradien Animasi */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Glassmorphism */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Foto Profil dengan Efek Ring */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        h1 { font-weight: 600; margin-bottom: 5px; font-size: 1.8rem; }
        p.subtitle { font-weight: 300; opacity: 0.9; margin-bottom: 20px; font-style: italic; }

        .info-section {
            text-align: left;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .info-section h3 { font-size: 1rem; margin-bottom: 8px; border-left: 4px solid #fff; padding-left: 10px; }
        
        ul { list-style: none; }
        li { font-size: 0.9rem; margin-bottom: 5px; display: flex; align-items: center; }
        li::before { content: "▹"; margin-right: 8px; color: #fff; }

        /* Tombol Sosial Media */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            text-decoration: none;
            color: #333;
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="profile-img">
        
        <h1>[NAMA KAMU]</h1>
        <p class="subtitle">Siswa TJKT @ SMK Putra Perdana Indonesia</p>

        <div class="info-section">
            <h3>Biodata</h3>
            <p style="font-size: 0.9rem;">Asal: Tangerang, Indonesia</p>
            <p style="font-size: 0.9rem;">Cita-cita: Cloud Engineer / Developer</p>
        </div>

        <div class="info-section">
            <h3>Hobi & Minat</h3>
            <ul>
                <li>Ngoding HTML & CSS</li>
                <li>Gaming & E-Sports</li>
                <li>Eksperimen Jaringan (Cisco)</li>
            </ul>
        </div>

        <div class="social-links">
            <a href="#" class="btn">Instagram</a>
            <a href="#" class="btn">GitHub</a>
        </div>
    </div>

</body>
</html>
